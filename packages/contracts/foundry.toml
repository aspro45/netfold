[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 10000
via_ir = true
evm_version = "prague"
ffi = false
fuzz = { runs = 512 }
invariant = { runs = 128, depth = 64, fail_on_revert = false }

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
